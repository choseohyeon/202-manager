<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 출석 기록</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .my-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .my-summary-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      text-align: center;
    }
    .my-summary-card .label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 6px; }
    .my-summary-card .value { font-size: 22px; font-weight: 800; color: var(--text); }
    .my-summary-card .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    .history-table { width: 100%; border-collapse: collapse; font-size: 14px; background: var(--white); }
    .history-table th { background: var(--gray-bg); padding: 10px 14px; text-align: left; font-size: 13px; color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--border); }
    .history-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: #fafafa; }

    .days-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .day-chip { font-size: 11px; background: var(--success-bg); color: var(--success); padding: 2px 7px; border-radius: 10px; font-weight: 600; }

    .week-label { font-weight: 600; white-space: nowrap; }
    .week-count { font-weight: 700; }

    .nav-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-secondary);
      text-decoration: none; margin-left: auto;
    }
    .nav-link:hover { color: var(--primary); }

    #statsArea { display: none; }

    .this-week-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .this-week-info .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .this-week-info .big { font-size: 26px; font-weight: 800; }
    .this-week-info .note { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .progress-bar-wrap { flex: 1; max-width: 200px; }
    .progress-bar-bg { background: var(--gray-bg); border-radius: 100px; height: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 100px; transition: width .4s; background: var(--primary); }
    .progress-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; text-align: right; }

    @media (max-width: 480px) {
      .my-summary-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .my-summary-card { padding: 12px 8px; }
      .my-summary-card .value { font-size: 18px; }
      .this-week-card { flex-direction: column; align-items: flex-start; }
      .progress-bar-wrap { width: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner">
      <h1>📚 열람실 출석 관리</h1>
      <a href="/" class="nav-link">← 출석 신청</a>
    </div>
  </header>

  <div class="container" style="max-width:560px">
    <div class="card" style="margin-bottom:20px">
      <div class="card-title" style="font-size:18px;font-weight:800;margin-bottom:4px">내 출석 기록</div>
      <div style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">이름을 선택하면 출석 현황을 확인할 수 있습니다.</div>
      <div class="form-group" style="margin-bottom:0">
        <label for="memberSelect">이름 선택</label>
        <select id="memberSelect" class="form-control" onchange="onMemberChange()">
          <option value="">-- 이름을 선택하세요 --</option>
        </select>
      </div>
    </div>

    <div id="statsArea">
      <!-- 이번 주 현황 -->
      <div class="this-week-card" id="thisWeekCard">
        <div class="this-week-info">
          <div class="label">이번 주 출석</div>
          <div class="big" id="thisWeekBig">-</div>
          <div class="note" id="thisWeekNote"></div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
          </div>
          <div class="progress-label" id="progressLabel"></div>
        </div>
      </div>

      <!-- 요약 카드 -->
      <div class="my-summary-grid">
        <div class="my-summary-card">
          <div class="label">총 출석 주</div>
          <div class="value" id="sumRecognized">-</div>
          <div class="sub">인정</div>
        </div>
        <div class="my-summary-card">
          <div class="label">누적 미달</div>
          <div class="value" id="sumUnrecognized" style="color:var(--warning)">-</div>
          <div class="sub">주</div>
        </div>
        <div class="my-summary-card">
          <div class="label">상태</div>
          <div class="value" id="sumStatus" style="font-size:14px;padding-top:4px">-</div>
        </div>
      </div>

      <!-- 주별 기록 -->
      <div class="card">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px">주별 기록</div>
        <div class="table-wrapper" style="border-radius:var(--radius-sm);box-shadow:none">
          <table class="history-table">
            <thead>
              <tr>
                <th>기간</th>
                <th>출석일</th>
                <th style="text-align:center">횟수</th>
                <th style="text-align:center">결과</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    function formatDate(str) {
      if (!str) return '-';
      const d = new Date(str + 'T00:00:00');
      return `${d.getMonth()+1}/${d.getDate()}(${dayNames[d.getDay()]})`;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function loadMembers() {
      const sel = document.getElementById('memberSelect');
      try {
        const res = await fetch('/api/members');
        const members = await res.json();
        members.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = `${m.name} (${m.seat_number}번 자리)`;
          sel.appendChild(opt);
        });
      } catch {
        showToast('멤버 목록을 불러올 수 없습니다.', 'error');
      }
    }

    async function onMemberChange() {
      const memberId = document.getElementById('memberSelect').value;
      const statsArea = document.getElementById('statsArea');
      if (!memberId) { statsArea.style.display = 'none'; return; }
      try {
        const res = await fetch('/api/stats');
        const { weeks, stats } = await res.json();
        const member = stats.find(s => String(s.id) === String(memberId));
        if (!member) return;
        renderStats(member, weeks);
        statsArea.style.display = 'block';
      } catch {
        showToast('데이터를 불러올 수 없습니다.', 'error');
      }
    }

    function renderStats(member, weeks) {
      // 이번 주 현황
      const currentWeekStat = member.weekStats.find(w => w.isCurrentWeek);
      const count = currentWeekStat?.count ?? 0;
      const needed = Math.max(0, 4 - count);
      const pct = Math.min(100, Math.round((count / 4) * 100));

      document.getElementById('thisWeekBig').textContent = `${count}일`;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressFill').style.background =
        count >= 4 ? 'var(--success)' : count >= 3 ? 'var(--warning)' : 'var(--primary)';

      if (currentWeekStat?.status === 'exempted') {
        document.getElementById('thisWeekNote').textContent = '이번 주는 공휴일로 면제입니다.';
        document.getElementById('progressLabel').textContent = '면제';
      } else if (count >= 4) {
        document.getElementById('thisWeekNote').textContent = '이번 주 출석 인정 완료 ✓';
        document.getElementById('progressLabel').textContent = '4/4일';
      } else {
        document.getElementById('thisWeekNote').textContent = `${needed}일 더 출석하면 이번 주 인정`;
        document.getElementById('progressLabel').textContent = `${count}/4일`;
      }

      // 요약
      const completed = member.weekStats.filter(w => w.status !== 'ongoing' && w.status !== 'exempted');
      const recognized = completed.filter(w => w.status === 'recognized').length;
      const unrecognized = member.unrecognizedCount;

      document.getElementById('sumRecognized').textContent = recognized;
      document.getElementById('sumUnrecognized').textContent = unrecognized;
      document.getElementById('sumUnrecognized').style.color =
        unrecognized >= 4 ? 'var(--danger)' : unrecognized >= 3 ? 'var(--warning)' : 'var(--text)';

      const statusEl = document.getElementById('sumStatus');
      if (!member.is_active) {
        statusEl.innerHTML = '<span class="badge badge-gray">비활성</span>';
      } else if (member.shouldRevoke) {
        statusEl.innerHTML = '<span class="badge badge-danger">박탈대상</span>';
      } else if (member.isAtRisk) {
        statusEl.innerHTML = '<span class="badge badge-warning">위험</span>';
      } else {
        statusEl.innerHTML = '<span class="badge badge-success">정상</span>';
      }

      // 주별 기록 (최신순)
      const tbody = document.getElementById('historyBody');
      const sortedWeeks = [...weeks].reverse();
      tbody.innerHTML = sortedWeeks.map(weekInfo => {
        const ws = member.weekStats.find(s => s.week === weekInfo.week);
        const days = ws?.days ?? [];
        const cnt = ws?.count ?? 0;
        const status = ws?.status ?? 'empty';

        let badgeHtml;
        if (status === 'exempted') badgeHtml = '<span class="badge" style="background:#ede9fe;color:#7c3aed">면제</span>';
        else if (status === 'recognized') badgeHtml = '<span class="badge badge-success">인정</span>';
        else if (status === 'unrecognized') badgeHtml = '<span class="badge badge-warning">미인정</span>';
        else if (status === 'ongoing') badgeHtml = '<span class="badge" style="background:#dbeafe;color:#2563eb">진행중</span>';
        else badgeHtml = '<span class="badge badge-gray">-</span>';

        const chipsHtml = days.length > 0
          ? `<div class="days-chips">${days.map(d => `<span class="day-chip">${formatDate(d)}</span>`).join('')}</div>`
          : '<span style="color:var(--text-secondary);font-size:13px">없음</span>';

        return `
          <tr>
            <td class="week-label">${weekInfo.label}</td>
            <td>${chipsHtml}</td>
            <td style="text-align:center" class="week-count">${cnt > 0 ? cnt + '일' : '-'}</td>
            <td style="text-align:center">${badgeHtml}</td>
          </tr>
        `;
      }).join('');
    }

    loadMembers();
  </script>
</body>
</html>
