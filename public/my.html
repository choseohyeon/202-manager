<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석 현황</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .nav-link {
      margin-left: auto; font-size: 13px; color: var(--text-secondary);
      text-decoration: none;
    }
    .nav-link:hover { color: var(--primary); }

    .public-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      font-size: 14px;
    }
    .public-table th {
      background: var(--gray-bg);
      padding: 10px 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    .public-table th.sticky { position: sticky; left: 0; z-index: 1; text-align: left; }
    .public-table td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .public-table td.sticky {
      position: sticky; left: 0; background: var(--white); z-index: 1;
      text-align: left; box-shadow: 2px 0 4px rgba(0,0,0,.04);
      font-weight: 600;
    }
    .public-table tr:last-child td { border-bottom: none; }
    .public-table tr:hover td { background: #fafafa; }
    .public-table tr:hover td.sticky { background: #fafafa; }

    .cell-inner { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .cell-count { font-size: 15px; font-weight: 700; }
    .cell-badge { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }

    .row-at-risk td { background: #fffbeb !important; }
    .row-revoke td { background: #fff1f1 !important; }
    .row-at-risk td.sticky { background: #fffbeb !important; }
    .row-revoke td.sticky { background: #fff1f1 !important; }

    .member-name-cell { font-weight: 700; }
    .member-seat-cell { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

    .this-week-highlight th { background: #eef2ff; color: var(--primary); }

    #content { padding-top: 24px; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner">
      <h1>📚 열람실 출석 관리</h1>
      <a href="/" class="nav-link">← 출석 신청</a>
    </div>
  </header>

  <div class="admin-container">
    <div class="section-header">
      <span class="section-title">주별 출석 현황</span>
      <span style="font-size:12px;color:var(--text-secondary)" id="lastUpdated"></span>
    </div>

    <div id="content">
      <div class="empty-state"><div class="icon">📊</div><p>불러오는 중...</p></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    function formatWeekLabel(w) { return w.label; }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function load() {
      try {
        const res = await fetch('/api/stats');
        const { weeks, stats } = await res.json();
        const active = stats.filter(m => m.is_active);

        document.getElementById('lastUpdated').textContent = `${new Date().toLocaleTimeString('ko-KR')} 기준`;

        // Table
        const thead = `<thead>
          <tr>
            <th class="sticky" style="min-width:110px">이름</th>
            ${weeks.map(w => {
              const isCurrent = w.week === weeks[weeks.length - 1]?.week;
              return `<th style="min-width:80px${isCurrent ? ';color:var(--primary)' : ''}">${w.label}${isCurrent ? '<br><span style="font-size:10px;font-weight:500">이번 주</span>' : ''}</th>`;
            }).join('')}
            <th style="min-width:70px">누적 미달</th>
          </tr>
        </thead>`;

        const tbody = `<tbody>${active.map(member => {

          const weekCells = weeks.map(w => {
            const ws = member.weekStats.find(s => s.week === w.week);
            if (ws?.status === 'na')
              return `<td><div class="cell-inner"><span class="cell-count" style="color:var(--gray)">-</span><span class="cell-badge" style="background:var(--gray-bg);color:var(--gray)">-</span></div></td>`;
            if (ws?.status === 'exempted')
              return `<td><div class="cell-inner"><span class="cell-count" style="color:#7c3aed">-</span><span class="cell-badge" style="background:#ede9fe;color:#7c3aed">면제</span></div></td>`;
            if (!ws)
              return `<td><div class="cell-inner"><span class="cell-count" style="color:var(--gray)">-</span></div></td>`;
            if (ws.status === 'ongoing' && ws.count === 0)
              return `<td><div class="cell-inner"><span class="cell-badge" style="background:#dbeafe;color:#2563eb">진행중</span></div></td>`;
            const color = ws.status === 'recognized' ? 'var(--success)' : ws.status === 'unrecognized' ? 'var(--warning)' : '#2563eb';
            const bg = ws.status === 'recognized' ? 'var(--success-bg)' : ws.status === 'unrecognized' ? 'var(--warning-bg)' : '#dbeafe';
            const label = ws.status === 'recognized' ? '인정' : ws.status === 'unrecognized' ? '미인정' : '진행중';
            return `<td><div class="cell-inner"><span class="cell-count">${ws.count}일</span><span class="cell-badge" style="background:${bg};color:${color}">${label}</span></div></td>`;
          }).join('');

          const unrecColor = member.unrecognizedCount >= 4 ? 'var(--danger)' : member.unrecognizedCount >= 3 ? 'var(--warning)' : 'var(--text)';

          return `<tr>
            <td class="sticky">
              <div class="member-name-cell">${member.name}</div>
              <div class="member-seat-cell">${member.seat_number}번 자리</div>
            </td>
            ${weekCells}
            <td style="text-align:center;font-weight:800;font-size:16px;color:${unrecColor}">${member.unrecognizedCount}</td>
          </tr>`;
        }).join('')}</tbody>`;

        document.getElementById('content').innerHTML = `
          <div class="table-wrapper">
            <table class="public-table">${thead}${tbody}</table>
          </div>
          <p style="font-size:12px;color:var(--text-secondary);margin-top:12px">* 인정 기준: 주 4일 이상 출석</p>
        `;
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>불러오기 실패</p></div>`;
        console.error(err);
      }
    }

    load();
  </script>
</body>
</html>
