<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>열람실 출석 신청</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; flex-direction: column; }
    .checkin-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .card-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .card-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    .today-chip {
      display: inline-block;
      background: var(--exempted-bg);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
    }
    #result { margin-top: 16px; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner">
      <h1>📚 열람실 출석 관리</h1>
      <a href="/my.html" class="nav-link" style="margin-left:auto;">내 기록 보기 →</a>
    </div>
  </header>

  <div class="checkin-wrapper">
    <div class="container">
      <div class="card">
        <div class="card-title">출석 신청</div>
        <div class="card-subtitle">자리번호와 날짜가 보이도록 사진을 찍어 제출해주세요.</div>

        <form id="checkinForm">
          <div class="form-group">
            <label for="memberSelect">이름 선택</label>
            <select id="memberSelect" class="form-control" required disabled>
              <option value="">불러오는 중...</option>
            </select>
          </div>

          <input type="hidden" id="checkinDate">
          <div class="form-group">
            <label for="todayDisplay">출석 날짜</label>
            <output id="todayDisplay" class="form-control" style="background:var(--gray-bg);color:var(--text-secondary);cursor:default;display:block"></output>
          </div>

          <div class="form-group">
            <label for="photoInput">
              인증 사진
              <span class="hint">(자리번호 + 날짜 표시)</span>
            </label>
            <div class="photo-upload-area" id="uploadArea">
              <input type="file" id="photoInput" accept="image/*">
              <img id="photoPreview" class="photo-preview" alt="미리보기">
              <div id="uploadPlaceholder">
                <span class="upload-icon">📷</span>
                <p class="upload-text"><strong>사진 선택</strong> 또는 카메라 촬영</p>
              </div>
            </div>
          </div>

          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">* 본인 이름과 자리번호를 다시 한번 확인 후 신청해주세요.</p>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
            출석 신청하기
          </button>
        </form>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <!-- 멤버 인증 오버레이 -->
  <div id="memberAuthOverlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;" role="dialog" aria-modal="true" aria-labelledby="memberAuthTitle">
    <div style="width:100%;max-width:360px;padding:0 24px">
      <div class="card" style="text-align:center">
        <div class="card-title" id="memberAuthTitle">🔒 열람실 출석 관리</div>
        <div class="card-subtitle">접근하려면 비밀번호를 입력해주세요.</div>
        <div class="form-group" style="text-align:left;margin-bottom:8px">
          <input type="password" id="memberPwInput" class="form-control" placeholder="비밀번호" autocomplete="current-password">
        </div>
        <div id="memberPwError" style="color:var(--danger);font-size:13px;margin-bottom:12px;min-height:18px"></div>
        <button class="btn btn-primary btn-block" onclick="submitMemberAuth()">확인</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script>
    // Set today's date as default and max
    const dateInput = document.getElementById('checkinDate');
    function getTodayStr() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      return kst.toISOString().split('T')[0];
    }
    const today = getTodayStr();
    dateInput.value = today;
    dateInput.max = today;

    // Display today's date in Korean format
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    const [y, m, d] = today.split('-').map(Number);
    const dow = new Date(Date.UTC(y, m - 1, d)).getDay();
    document.getElementById('todayDisplay').textContent = `${y}년 ${m}월 ${d}일 (${dayNames[dow]})`;


    // ── 멤버 인증 ──────────────────────────────────────
    function memberFetch(url, options = {}) {
      const token = localStorage.getItem('memberToken');
      const headers = { ...(options.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return fetch(url, { ...options, headers }).then(res => {
        if (res.status === 401) {
          localStorage.removeItem('memberToken');
          location.reload();
        }
        return res;
      });
    }

    async function checkMemberAuth() {
      if (localStorage.getItem('memberToken')) return;
      const overlay = document.getElementById('memberAuthOverlay');
      overlay.style.display = 'flex';
      document.getElementById('memberPwInput').focus();
      const status = await fetch('/api/member/status').then(r => r.json()).catch(() => ({ required: true }));
      if (!status.required) { overlay.style.display = 'none'; return; }
      await new Promise(resolve => { window._memberAuthResolve = resolve; });
    }

    async function submitMemberAuth() {
      const pw = document.getElementById('memberPwInput').value;
      const errEl = document.getElementById('memberPwError');
      errEl.textContent = '';
      try {
        const res = await fetch('/api/member/verify', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        if (data.token) localStorage.setItem('memberToken', data.token);
        document.getElementById('memberAuthOverlay').style.display = 'none';
        if (window._memberAuthResolve) { window._memberAuthResolve(); window._memberAuthResolve = null; }
      } catch (err) {
        errEl.textContent = err.message;
        document.getElementById('memberPwInput').value = '';
        document.getElementById('memberPwInput').focus();
      }
    }

    document.getElementById('memberPwInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitMemberAuth();
    });

    // Load members
    async function loadMembers() {
      const sel = document.getElementById('memberSelect');
      try {
        const res = await memberFetch('/api/members');
        const members = await res.json();
        sel.innerHTML = '<option value="">-- 이름을 선택하세요 --</option>';
        members.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = `${m.name} (${m.seat_number}번 자리)`;
          sel.appendChild(opt);
        });
        sel.disabled = false;
      } catch {
        sel.innerHTML = '<option value="">불러오기 실패 (새로고침 해주세요)</option>';
        showToast('사용자 목록을 불러올 수 없습니다.', 'error');
      }
    }

    checkMemberAuth().then(() => loadMembers());

    // Photo preview
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');

    photoInput.addEventListener('change', () => {
      const file = photoInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        photoPreview.src = e.target.result;
        photoPreview.style.display = 'block';
        uploadPlaceholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // Drag & drop
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file?.type.startsWith('image/')) {
        const dt = new DataTransfer();
        dt.items.add(file);
        photoInput.files = dt.files;
        photoInput.dispatchEvent(new Event('change'));
      }
    });

    // Submit
    document.getElementById('checkinForm').addEventListener('submit', async e => {
      e.preventDefault();
      const memberId = document.getElementById('memberSelect').value;
      const date = dateInput.value;
      const file = photoInput.files[0];
      const btn = document.getElementById('submitBtn');

      if (!memberId) return showToast('이름을 선택해주세요.', 'error');
      if (!file) return showToast('사진을 첨부해주세요.', 'error');

      btn.disabled = true;
      btn.textContent = '신청 중...';

      const fd = new FormData();
      fd.append('member_id', memberId);
      fd.append('checkin_date', date);
      fd.append('photo', file);

      try {
        const res = await memberFetch('/api/checkin', { method: 'POST', body: fd });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        document.getElementById('result').innerHTML = `
          <div class="alert alert-success">
            ✅ ${data.message}
          </div>
        `;
        document.getElementById('checkinForm').reset();
        photoPreview.style.display = 'none';
        uploadPlaceholder.style.display = 'block';
        dateInput.value = today;
      } catch (err) {
        document.getElementById('result').innerHTML = `
          <div class="alert alert-error">⚠️ ${err.message}</div>
        `;
      } finally {
        btn.disabled = false;
        btn.textContent = '출석 신청하기';
      }
    });

    // Toast
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
